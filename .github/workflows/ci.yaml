name: CI

on:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feature/github-repo-importer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: feature/github-repo-importer/go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
